seed: 42


# Models are instantiated using skrl's model instantiator utility
# https://skrl.readthedocs.io/en/latest/api/utils/model_instantiators.html
models:
  separate: True

  policy:  # see gaussian_model parameters
    class: DeterministicMixin
    clip_actions: True
    clip_log_std: True
    min_log_std: -20.0
    max_log_std: 2.0
    initial_log_std: 0.0
    network:
      - name: net
        input: STATES
        layers: [256, 128, 64]
        activations: elu
    output: ACTIONS
  
  target_policy:  # see gaussian_model parameters
    class: DeterministicMixin
    clip_actions: True
    clip_log_std: True
    min_log_std: -20.0
    max_log_std: 2.0
    initial_log_std: 0.0
    network:
      - name: net
        input: STATES
        layers: [256, 128, 64]
        activations: elu
    output: ACTIONS

  critic_1:  # see deterministic_model parameters
    class: DeterministicMixin
    clip_actions: False
    network:
      - name: net
        input: STATES_ACTIONS
        layers: [256, 128, 64]
        activations: elu
    output: ONE

  critic_2:  # see deterministic_model parameters
    class: DeterministicMixin
    clip_actions: False
    network:
      - name: net
        input: STATES_ACTIONS
        layers: [256, 128, 64]
        activations: elu
    output: ONE

  target_critic_1:  # see deterministic_model parameters
    class: DeterministicMixin
    clip_actions: False
    network:
      - name: net
        input: STATES_ACTIONS
        layers: [256, 128, 64]
        activations: elu
    output: ONE

  target_critic_2:  # see deterministic_model parameters
    class: DeterministicMixin
    clip_actions: False
    network:
      - name: net
        input: STATES_ACTIONS
        layers: [256, 128, 64]
        activations: elu
    output: ONE


# Rollout memory
# https://skrl.readthedocs.io/en/latest/api/memories/random.html
memory:
  class: RandomMemory
  memory_size: -1  # automatically determined (same as agent:rollouts)


# PPO agent configuration (field names are from PPO_DEFAULT_CONFIG)
# https://skrl.readthedocs.io/en/latest/api/agents/ppo.html
agent:
  class: TD3

  gradient_steps: 1
  batch_size: 64
  rollouts: 16

  discount_factor: 0.99
  polyak: 0.005
  
  actor_learning_rate: 0.0003
  critic_learning_rate: 0.0003
  learning_rate_scheduler: None
  learning_rate_scheduler_kwargs: null

  state_preprocessor: RunningStandardScaler
  state_preprocessor_kwargs: null
  value_preprocessor: RunningStandardScaler
  value_preprocessor_kwargs: null
  
  random_timesteps: 0
  learning_starts: 0

  grad_norm_clip: 1.0

  exploration:
    noise: None
    initial_scale: 0.02
    final_scale: 0.001
    timesteps: None

  policy_delay: 2
  smooth_regularization_noise: None
  smooth_regularization_clip: 0.5

  rewards_shaper: None
  mixed_precision: False

  # logging and checkpoint
  experiment:
    directory: "ur5e_lift_td3"
    experiment_name: ""
    write_interval: auto
    checkpoint_interval: auto


# Sequential trainer
# https://skrl.readthedocs.io/en/latest/api/trainers/sequential.html
trainer:
  class: SequentialTrainer
  timesteps: 100000
  environment_info: log
